<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="BallotBuddy — Your AI-powered election assistant. Compare candidates, learn voting procedures, find your polling booth, and get personalized election guidance." />
    <meta name="theme-color" content="#0f1115" />
    <title>BallotBuddy | Your AI Election Assistant</title>
    <!-- Google Fonts — preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600;700;800&display=swap" as="style" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- Skip Navigation Link (Accessibility) -->
    <a href="#app-container" class="skip-link" id="skip-nav">Skip to main content</a>

    <!-- Navbar -->
    <header>
      <nav role="navigation" aria-label="Main navigation">
        <div class="nav-left">
          <a href="#" class="logo" aria-label="BallotBuddy home">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
              <path d="M19 3H5C3.89543 3 3 3.89543 3 5V19C3 20.1046 3.89543 21 5 21H19C20.1046 21 21 20.1046 21 19V5C21 3.89543 20.1046 3 19 3Z" stroke="#4285F4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M9 12L11 14L15 10" stroke="#4285F4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Ballot<span>Buddy</span>
          </a>
          <div id="nav-back" aria-label="Back navigation"></div>
        </div>
        <div id="nav-actions" aria-label="User actions">
          <!-- Populated by JS based on auth state -->
        </div>
      </nav>
    </header>

    <!-- Main Content -->
    <main class="container" role="main" aria-live="polite">
      <div id="app-container">
        <!-- Content injected dynamically via JS -->
      </div>
    </main>

    <!-- Footer -->
    <footer role="contentinfo" style="text-align:center; padding:1.5rem; color:var(--text-muted); font-size:0.8rem; border-top:1px solid var(--border-color);">
      <p>&copy; 2026 BallotBuddy. Built for informed voting. Not affiliated with ECI.</p>
    </footer>

    <!-- Screen reader announcer (created by JS, placeholder for SSR) -->
    <div id="sr-announcer" aria-live="polite" aria-atomic="true" class="sr-only" role="status"></div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
